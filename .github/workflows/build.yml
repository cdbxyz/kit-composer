name: Build

on:
  push:
    branches: [main]

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # canvas requires cairo, pango, libpng, jpeg, giflib, librsvg — not present
      # on the macOS runner by default. Sharp is fine; it ships pre-built binaries
      # via @img/* packages and does not require any extra system libraries.
      - name: Install canvas system dependencies (macOS)
        run: brew install cairo pango libpng jpeg giflib librsvg

      - name: Install dependencies
        run: npm ci

      # Rebuild Sharp + canvas .node binaries against the Electron ABI.
      # Must run after npm ci so electron-builder can read the electron version
      # from devDependencies and target the correct ABI.
      - name: Rebuild native addons for Electron (macOS)
        run: npm run rebuild

      - name: Build macOS distributable
        run: npx electron-builder --mac --publish never
        env:
          # No signing certificate in CI — disable auto-discovery so the build
          # doesn't hard-fail looking for a keychain identity.
          # To enable signing: add CSC_LINK + CSC_KEY_PASSWORD GitHub Secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign the app bundle
        run: |
          find dist -name "*.app" | while read app; do
            codesign --sign - --deep --force --preserve-metadata=entitlements,requirements,flags "$app"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/**/*.dmg
            dist/**/*.zip
          if-no-files-found: error
          retention-days: 30

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # canvas@3.x ships pre-built Windows binaries via node-pre-gyp so no
      # extra system libraries are needed. If a pre-built binary isn't available
      # for this Node/Electron ABI, node-gyp will compile from source using the
      # MSVC build tools already present on the windows-latest runner.
      - name: Install dependencies
        run: npm ci

      # Rebuild Sharp + canvas .node binaries against the Electron ABI.
      - name: Rebuild native addons for Electron (Windows)
        run: npm run rebuild

      - name: Build Windows distributable
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/**/*.exe
          if-no-files-found: error
          retention-days: 30
