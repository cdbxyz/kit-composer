appId: com.fanatics.kit-composer
productName: Kit Composer
copyright: "Copyright 2025 Fanatics, Inc."

directories:
  output: out
  buildResources: assets

files:
  - src/**/*
  - assets/**/*
  - profiles/**/*
  - package.json
  - "!out/**"
  - "!node_modules/**"

asar: true
asarUnpack:
  # Native .node addons must live outside the asar archive
  - "node_modules/sharp/**"
  - "node_modules/canvas/**"
  - "node_modules/@img/**"

mac:
  category: public.app-category.graphics-design
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  hardenedRuntime: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
  category: Graphics

publish: null
